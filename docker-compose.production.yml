version: '3.9'

services:
  framework-test:
    build:
      context: .
      dockerfile: Dockerfile
    image: mmorpg/framework-test:latest
    container_name: mmorpg-framework-test
    restart: unless-stopped
    ports:
      - "7001:7001"   # TCP game port
      - "8080:8080"   # HTTP API
      - "9091:9091"   # Prometheus metrics
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - DOTNET_EnableDiagnostics=0
      - DOTNET_gcServer=1
      - AUTO_RUN_TESTS=1
      - TCP_PORT=7001
      - HTTP_PORT=8080
      - PROMETHEUS_PORT=9091
      - TARGET_FPS=30
      - MAX_CONNECTIONS=10000
      - HEARTBEAT_TIMEOUT=30
      - ENABLE_METRICS=1
      - ENABLE_TRACING=1
      - TEST_TIMEOUT_SECONDS=30
      - TEST_MAX_RETRIES=2
      # - TEST_API_KEY=your-secure-api-key-here  # 取消注释并设置启用 API Key 认证
    volumes:
      - ./logs:/app/logs:rw
      - ./config:/app/config:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"
    networks:
      - mmorpg-net

  prometheus:
    image: prom/prometheus:latest
    container_name: mmorpg-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
    networks:
      - mmorpg-net

  grafana:
    image: grafana/grafana:latest
    container_name: mmorpg-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin123  # 生产环境请修改！
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_INSTALL_PLUGINS=grafana-clock-panel,grafana-simple-json-datasource
    volumes:
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    networks:
      - mmorpg-net

volumes:
  prometheus-data:
    driver: local
  grafana-data:
    driver: local

networks:
  mmorpg-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
