name: SonarQube Analysis

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  DOTNET_VERSION: '10.0.x'

jobs:
  sonarqube:
    name: SonarQube Code Quality Scan
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # SonarQube 需要完整历史来检测新代码

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Setup Java (SonarQube Scanner 需要)
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Cache SonarQube packages
      uses: actions/cache@v4
      with:
        path: ~/.sonar/cache
        key: ${{ runner.os }}-sonar
        restore-keys: ${{ runner.os }}-sonar

    - name: Cache NuGet packages
      uses: actions/cache@v4
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-nuget-${{ hashFiles('**/packages.lock.json', '**/*.csproj') }}
        restore-keys: |
          ${{ runner.os }}-nuget-

    - name: Install SonarQube Scanner
      run: |
        dotnet tool install --global dotnet-sonarscanner

    - name: Install Coverage Tools
      run: |
        dotnet tool install --global dotnet-coverage

    - name: Begin SonarQube Analysis
      run: |
        dotnet sonarscanner begin \
          /k:"MMORPG_Framework" \
          /n:"MMORPG.Framework" \
          /v:"${{ github.sha }}" \
          /d:sonar.host.url="${{ secrets.SONAR_HOST_URL }}" \
          /d:sonar.token="${{ secrets.SONAR_TOKEN }}" \
          /d:sonar.cs.opencover.reportsPaths="**/coverage.opencover.xml" \
          /d:sonar.exclusions="**/bin/**,**/obj/**,**/*.Tests.csproj,**/benchmarks/**" \
          /d:sonar.coverage.exclusions="**/*Tests.cs,**/tests/**" \
          /d:sonar.qualitygate.wait=true \
          /d:sonar.qualitygate.timeout=300

    - name: Build
      run: dotnet build --configuration Release --no-incremental

    - name: Run Tests with Coverage
      run: |
        dotnet test --configuration Release --no-build \
          --collect:"XPlat Code Coverage" \
          --results-directory ./TestResults \
          --verbosity normal

    - name: Merge Coverage Reports
      run: |
        dotnet-coverage merge ./TestResults/**/*.cobertura.xml \
          -o coverage.opencover.xml \
          -f opencover

    - name: End SonarQube Analysis
      run: |
        dotnet sonarscanner end /d:sonar.token="${{ secrets.SONAR_TOKEN }}"

    - name: Upload Coverage Report
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: coverage.opencover.xml
        retention-days: 30

    - name: Quality Gate Check Result
      if: always()
      run: |
        echo "SonarQube Quality Gate check completed."
        echo "Check the SonarQube dashboard for detailed analysis results."

  # 分支：安全热点扫描（独立 job）
  security-hotspots:
    name: Security Hotspots Scan
    runs-on: ubuntu-latest
    needs: sonarqube
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Run Security Analysis
      run: |
        echo "Security hotspots are included in the main SonarQube analysis."
        echo "Review the Security Hotspots tab in SonarQube dashboard."