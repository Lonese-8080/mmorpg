name: Performance Benchmark Gate

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:  # 手动触发

env:
  DOTNET_VERSION: '10.0.x'
  BENCHMARK_THRESHOLD_WARNING: 10  # 性能退化超过 10% 则警告
  BENCHMARK_THRESHOLD_FAILURE: 20  # 性能退化超过 20% 则 CI 失败

jobs:
  benchmark:
    name: Performance Benchmark
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Restore Packages
      run: dotnet restore

    - name: Build
      run: dotnet build --configuration Release --no-incremental

    - name: Run Benchmarks
      run: |
        cd benchmarks/MMORPG.Framework.Benchmarks
        dotnet run --configuration Release --framework net10.0 \
          --exporters json markdown \
          --filter "*" \
          --memory true \
          --logToConsole true

    - name: Upload Benchmark Results
      uses: actions/upload-artifact@v4
      with:
        name: benchmark-results
        path: |
          benchmarks/MMORPG.Framework.Benchmarks/BenchmarkDotNet.Artifacts/results/*.md
          benchmarks/MMORPG.Framework.Benchmarks/BenchmarkDotNet.Artifacts/results/*.json
        retention-days: 90

    - name: Download Previous Benchmark Results
      uses: actions/download-artifact@v4
      continue-on-error: true
      with:
        name: benchmark-results
        path: previous-results

    - name: Compare Benchmark Results
      id: compare
      run: |
        # 检查是否有历史结果
        if [ -d "previous-results" ] && [ "$(ls -A previous-results 2>/dev/null)" ]; then
          echo "Comparing with previous benchmark results..."
          
          # 使用 Python 脚本比较结果
          python3 .github/scripts/compare_benchmarks.py \
            --previous previous-results/*.json \
            --current benchmarks/MMORPG.Framework.Benchmarks/BenchmarkDotNet.Artifacts/results/*.json \
            --threshold-warning $BENCHMARK_THRESHOLD_WARNING \
            --threshold-failure $BENCHMARK_THRESHOLD_FAILURE \
            --output comparison-report.md
          
          # 检查是否有性能退化
          if grep -q "PERFORMANCE_REGRESSION_FAILURE" comparison-report.md; then
            echo "performance_status=failure" >> $GITHUB_OUTPUT
            echo "::error::Performance regression exceeds threshold!"
          elif grep -q "PERFORMANCE_REGRESSION_WARNING" comparison-report.md; then
            echo "performance_status=warning" >> $GITHUB_OUTPUT
            echo "::warning::Performance regression detected but within threshold."
          else
            echo "performance_status=success" >> $GITHUB_OUTPUT
            echo "::notice::No performance regression detected."
          fi
        else
          echo "No previous benchmark results found. Skipping comparison."
          echo "performance_status=first_run" >> $GITHUB_OUTPUT
        fi

    - name: Upload Comparison Report
      uses: actions/upload-artifact@v4
      if: steps.compare.outputs.performance_status != 'first_run'
      with:
        name: comparison-report
        path: comparison-report.md
        retention-days: 30

    - name: Fail on Performance Regression
      if: steps.compare.outputs.performance_status == 'failure'
      run: |
        echo "Performance regression exceeds threshold. CI failed."
        exit 1

    - name: Comment on PR
      uses: actions/github-script@v7
      if: github.event_name == 'pull_request' && steps.compare.outputs.performance_status != 'first_run'
      with:
        script: |
          const fs = require('fs');
          const report = fs.readFileSync('comparison-report.md', 'utf8');
          
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: `## 📊 Performance Benchmark Results\n\n${report}`
          });

  # 压力测试（可选，手动触发）
  stress-test:
    name: Stress Test
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    needs: benchmark
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Build
      run: dotnet build --configuration Release

    - name: Run Stress Test
      run: |
        cd tests/MMORPG.Framework.StressTests
        dotnet run --configuration Release \
          --duration 60 \
          --connections 1000 \
          --message-rate 10000

    - name: Upload Stress Test Results
      uses: actions/upload-artifact@v4
      with:
        name: stress-test-results
        path: tests/MMORPG.Framework.StressTests/results/
        retention-days: 90