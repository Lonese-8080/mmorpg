# ====================================================================
# MMORPG Framework — CI 流水线
#
# 触发条件：
#   - push / pull_request 到 main / release/**
#   - 每日 UTC 02:00 定时构建（捕获依赖侧的回归）
#
# 阶段：
#   1. build     — 还原 + 编译
#   2. test      — 单元 + 集成测试 + 覆盖率
#   3. benchmark — 跑 BenchmarkDotNet 性能回归
#   4. docker    — 构建并推送镜像
#   5. quality   — 静态分析 / 包漏洞审计
# ====================================================================

name: CI

on:
  push:
    branches: [main, 'release/**']
    tags:     ['v*']
  pull_request:
    branches: [main, 'release/**']
  schedule:
    - cron: '0 2 * * *'   # 每日 02:00 UTC
  workflow_dispatch:

env:
  DOTNET_VERSION: '9.0.102'  # 使用稳定的 .NET 9.0
  DOTNET_NOLOGO: 'true'
  DOTNET_CLI_TELEMETRY_OPTOUT: 'true'
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 'true'

jobs:
  # ----------------------------------------------------------------
  # 1. 编译
  # ----------------------------------------------------------------
  build:
    name: Build (Windows + Linux)
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-
            ${{ runner.os }}-

      - name: Restore
        run: dotnet restore MMORPG.sln

      - name: Build (Debug)
        run: dotnet build MMORPG.sln -c Debug --no-restore --nologo

      - name: Build (Release)
        run: dotnet build MMORPG.sln -c Release --no-restore --nologo

  # ----------------------------------------------------------------
  # 2. 单元 + 集成测试 + 覆盖率（质量门禁）
  # ----------------------------------------------------------------
  test:
    name: Tests + Coverage
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}

      - name: Restore
        run: dotnet restore MMORPG.sln

      - name: Unit Tests + Coverage
        run: |
          dotnet test tests/MMORPG.Framework.Tests/MMORPG.Framework.Tests.csproj \
            -c Release --no-restore --nologo \
            -p:CollectCoverage=true \
            -p:CoverletOutputFormat=cobertura \
            -p:CoverletOutput=../../TestResults/coverage/unit/ \
            --results-directory ./TestResults/Unit \
            --logger "trx;LogFileName=UnitTests.trx"

      - name: Integration Tests + Coverage
        run: |
          dotnet test tests/MMORPG.Framework.IntegrationTests/MMORPG.Framework.IntegrationTests.csproj \
            -c Release --no-restore --nologo \
            -p:CollectCoverage=true \
            -p:CoverletOutputFormat=cobertura \
            -p:CoverletOutput=../../TestResults/coverage/integration/ \
            --results-directory ./TestResults/Integration \
            --logger "trx;LogFileName=IntegrationTests.trx"

      - name: Install ReportGenerator
        run: dotnet tool install -g dotnet-reportgenerator-globaltool

      - name: Merge Coverage Reports
        run: |
          reportgenerator \
            -reports:"./TestResults/coverage/**/*.cobertura.xml" \
            -targetdir:"./TestResults/coverage/merged" \
            -reporttypes:"Html;Cobertura;Badges" \
            -title:"MMORPG Framework 代码覆盖率"

      - name: Coverage Quality Gate
        run: |
          COVERAGE_FILE="./TestResults/coverage/merged/Cobertura.xml"
          
          if [ ! -f "$COVERAGE_FILE" ]; then
            echo "::error::覆盖率报告不存在，测试失败"
            exit 1
          fi
          
          # 从 Cobertura XML 中提取行覆盖率
          LINE_RATE=$(grep -oP 'line-rate="\K[^"]+' "$COVERAGE_FILE" | head -1)
          COVERAGE_PERCENT=$(echo "$LINE_RATE * 100" | bc -l | xargs printf "%.2f")
          
          echo "当前行覆盖率: ${COVERAGE_PERCENT}%"
          echo "最低要求: 25%"
          
          # 覆盖率阈值：25%，低于则失败
          THRESHOLD=25
          PASS=$(echo "$COVERAGE_PERCENT >= $THRESHOLD" | bc -l)
          
          if [ "$PASS" -eq 1 ]; then
            echo "✅ 覆盖率质量门禁通过 (${COVERAGE_PERCENT}% >= ${THRESHOLD}%)"
            echo "## 代码覆盖率" >> $GITHUB_STEP_SUMMARY
            echo "- **行覆盖率**: ${COVERAGE_PERCENT}%" >> $GITHUB_STEP_SUMMARY
            echo "- **阈值**: ${THRESHOLD}%" >> $GITHUB_STEP_SUMMARY
            echo "- **结果**: ✅ 通过" >> $GITHUB_STEP_SUMMARY
          else
            echo "::error::覆盖率质量门禁未通过: ${COVERAGE_PERCENT}% < ${THRESHOLD}%"
            echo "## 代码覆盖率" >> $GITHUB_STEP_SUMMARY
            echo "- **行覆盖率**: ${COVERAGE_PERCENT}%" >> $GITHUB_STEP_SUMMARY
            echo "- **阈值**: ${THRESHOLD}%" >> $GITHUB_STEP_SUMMARY
            echo "- **结果**: ❌ 未通过" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ github.run_id }}
          path: |
            TestResults/**/*.trx
            TestResults/coverage/merged/**
          if-no-files-found: error
          retention-days: 30

      - name: Publish Test Results
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Test Results
          path: TestResults/**/*.trx
          reporter: dotnet-trx
          fail-on-error: true

  # ----------------------------------------------------------------
  # 3. BenchmarkDotNet 性能基线
  # ----------------------------------------------------------------
  benchmark:
    name: Benchmark Regression
    needs: build
    runs-on: ubuntu-latest
    # 仅 main / release / 定时 / 手动触发时跑（PR 太重）
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/') || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Run Benchmarks
        run: |
          dotnet run --project benchmarks/MMORPG.Framework.Benchmarks/MMORPG.Framework.Benchmarks.csproj \
            -c Release -- \
            --job short \
            --filter "*" \
            --artifacts ./BenchmarkResults

      - name: Upload Benchmark Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results-${{ github.run_id }}
          path: ./BenchmarkResults/
          retention-days: 90

  # ----------------------------------------------------------------
  # 4. Docker 镜像构建
  # ----------------------------------------------------------------
  docker:
    name: Docker Build & Push
    needs: [test, benchmark]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/mmorpg-framework
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

  # ----------------------------------------------------------------
  # 5. 静态质量门禁
  # ----------------------------------------------------------------
  quality:
    name: Quality Gate
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore MMORPG.sln

      - name: Format check
        run: |
          dotnet format MMORPG.sln --verify-no-changes --no-restore --verbosity normal \
            || (echo "::error::代码格式不符合 dotnet format 规则，请运行 'dotnet format' 后提交" && exit 1)

      - name: Package vulnerability audit
        run: |
          dotnet list package --vulnerable --include-transitive --no-restore || true
          echo "## 依赖审计" >> $GITHUB_STEP_SUMMARY
          dotnet list package --vulnerable --include-transitive --no-restore 2>&1 >> $GITHUB_STEP_SUMMARY || true

  # ----------------------------------------------------------------
  # 6. 容器安全扫描 (Trivy)
  # ----------------------------------------------------------------
  security-scan:
    name: Container Security Scan
    needs: docker
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      packages: read
      security-events: write

    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/mmorpg-framework
          tags: |
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ fromJSON(steps.meta.outputs.json).tags[0] }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH,MEDIUM,LOW,UNKNOWN'
          exit-code: '0'
          ignore-unfixed: false
          vuln-type: 'os,library'

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Display Trivy Summary
        if: always()
        run: |
          echo "## 容器安全扫描结果" >> $GITHUB_STEP_SUMMARY
          if [ -f trivy-results.sarif ]; then
            echo "✓ 扫描完成，结果已上传到 Security 标签" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠ 未生成扫描结果文件" >> $GITHUB_STEP_SUMMARY
          fi

