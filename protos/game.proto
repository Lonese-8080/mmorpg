// game.proto
// 游戏业务消息定义

syntax = "proto3";

package MMORPG.Game;

option csharp_namespace = "MMORPG.Game.Messages";

// ============================================================
// 游戏业务消息 ID: 0x1000 - 0x1FFF
// ============================================================

// ----------------------------------------
// 战斗相关 (0x1100 - 0x11FF)
// ----------------------------------------

/// 客户端使用技能
message C2S_UseSkill
{
    /// 技能ID
    int32 skill_id = 1;
    
    /// 目标ID（可能是玩家/NPC）
    int64 target_id = 2;
    
    /// 目标位置（如果是 AOE 技能）
    Position target_position = 3;
    
    /// 客户端时间戳
    int64 client_time = 4;
}

/// 服务器技能效果广播
message S2C_SkillEffect
{
    /// 施法者ID
    int64 caster_id = 1;
    
    /// 技能ID
    int32 skill_id = 2;
    
    /// 技能等级
    int32 skill_level = 3;
    
    /// 效果类型（1:伤害 2:治疗 3:buff 4:debuff）
    int32 effect_type = 4;
    
    /// 效果值
    int32 effect_value = 5;
    
    /// 目标列表
    repeated SkillTarget targets = 6;
}

/// 技能目标
message SkillTarget
{
    /// 目标ID
    int64 target_id = 1;
    
    /// 是否暴击
    bool critical = 2;
    
    /// 伤害/治疗值
    int32 value = 3;
    
    /// 目标剩余血量
    int32 remaining_hp = 4;
}

/// 客户端普通攻击
message C2S_NormalAttack
{
    /// 目标ID
    int64 target_id = 1;
    
    /// 目标位置
    Position target_position = 2;
}

/// 服务器伤害广播
message S2C_DamageNotify
{
    /// 攻击者ID
    int64 attacker_id = 1;
    
    /// 目标ID
    int64 target_id = 2;
    
    /// 伤害值
    int32 damage = 3;
    
    /// 是否暴击
    bool critical = 4;
    
    /// 目标剩余血量
    int32 remaining_hp = 5;
    
    /// 攻击者剩余血量（如果攻击者是玩家）
    int32 attacker_remaining_hp = 6;
}

/// 实体死亡通知
message S2C_EntityDead
{
    /// 死亡实体ID
    int64 entity_id = 1;
    
    /// 击杀者ID
    int64 killer_id = 2;
    
    /// 死亡类型（1:被玩家击杀 2:被怪物击杀 3:其他）
    int32 dead_type = 3;
}

// ----------------------------------------
// 物品相关 (0x1200 - 0x12FF)
// ----------------------------------------

/// 客户端拾取物品
message C2S_PickupItem
{
    /// 物品ID
    int64 item_id = 1;
}

/// 服务器拾取结果
message S2C_PickupResult
{
    /// 是否成功
    bool success = 1;
    
    /// 物品ID
    int64 item_id = 2;
    
    /// 错误码
    int32 error_code = 3;
    
    /// 错误消息
    string error_message = 4;
    
    /// 获得物品信息
    ItemInfo item = 5;
}

/// 物品信息
message ItemInfo
{
    /// 物品ID（唯一）
    int64 id = 1;
    
    /// 物品配置ID
    int32 config_id = 2;
    
    /// 物品名称
    string name = 3;
    
    /// 物品类型
    int32 type = 4;
    
    /// 数量
    int32 count = 5;
    
    /// 品质
    int32 quality = 6;
    
    /// 绑定状态
    int32 bind_state = 7;
    
    /// 强化等级（如果是装备）
    int32 enhance_level = 8;
}

/// 物品掉落通知
message S2C_ItemDrop
{
    /// 掉落实体ID
    int64 drop_id = 1;
    
    /// 掉落位置
    Position position = 2;
    
    /// 物品配置ID
    int32 config_id = 3;
    
    /// 物品名称
    string name = 4;
    
    /// 数量
    int32 count = 5;
}

// ----------------------------------------
// 聊天相关 (0x1300 - 0x13FF)
// ----------------------------------------

/// 客户端发送聊天
message C2S_Chat
{
    /// 聊天频道（1:世界 2:当前场景 3:公会 4:队伍 5:私聊）
    int32 channel = 1;
    
    /// 私聊目标（如果是私聊）
    int64 target_id = 2;
    
    /// 聊天内容
    string content = 3;
    
    /// 内容类型（1:文字 2:表情 3:语音）
    int32 content_type = 4;
}

/// 服务器广播聊天
message S2C_ChatNotify
{
    /// 发送者ID
    int64 sender_id = 1;
    
    /// 发送者名称
    string sender_name = 2;
    
    /// 发送者等级
    int32 sender_level = 3;
    
    /// 聊天频道
    int32 channel = 4;
    
    /// 目标ID（私聊用）
    int64 target_id = 5;
    
    /// 聊天内容
    string content = 6;
    
    /// 时间戳
    int64 time = 7;
}

// ----------------------------------------
// 社交相关 (0x1400 - 0x14FF)
// ----------------------------------------

/// 添加好友请求
message C2S_AddFriend
{
    /// 目标玩家ID
    int64 target_player_id = 1;
    
    /// 备注（可选）
    string remark = 2;
}

/// 添加好友响应
message S2C_AddFriendResult
{
    /// 是否成功
    bool success = 1;
    
    /// 目标玩家ID
    int64 target_player_id = 2;
    
    /// 错误消息
    string error_message = 3;
}

/// 好友列表更新
message S2C_FriendListUpdate
{
    /// 好友列表
    repeated FriendInfo friends = 1;
}

/// 好友信息
message FriendInfo
{
    /// 玩家ID
    int64 player_id = 1;
    
    /// 玩家名称
    string name = 2;
    
    /// 等级
    int32 level = 3;
    
    /// 是否在线
    bool is_online = 4;
    
    /// 最后在线时间
    int64 last_online_time = 5;
}

// ----------------------------------------
// 公会相关 (0x1500 - 0x15FF)
// ----------------------------------------

/// 创建公会请求
message C2S_CreateGuild
{
    /// 公会名称
    string guild_name = 1;
    
    /// 公会公告
    string announcement = 2;
}

/// 创建公会响应
message S2C_CreateGuildResult
{
    /// 是否成功
    bool success = 1;
    
    /// 公会ID
    int64 guild_id = 2;
    
    /// 错误消息
    string error_message = 3;
}

/// 公会信息
message GuildInfo
{
    /// 公会ID
    int64 guild_id = 1;
    
    /// 公会名称
    string name = 2;
    
    /// 公会等级
    int32 level = 3;
    
    /// 成员数量
    int32 member_count = 4;
    
    /// 最大成员数
    int32 max_member_count = 5;
    
    /// 公会公告
    string announcement = 6;
}

// ----------------------------------------
// 通用类型定义
// ----------------------------------------

/// 位置信息
message Position
{
    float x = 1;
    float y = 2;
    float z = 3;
}