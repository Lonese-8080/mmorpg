# ==================================================================
# MMORPG Framework 框架测试环境
#
# 包含：
#   - framework-test : 框架测试工具（无游戏逻辑）
#   - prometheus     : 指标采集
#   - grafana        : 指标可视化

services:
  # ---------- 框架测试工具 ----------
  framework-test:
    build:
      context: .
      dockerfile: Dockerfile
    image: mmorpg/framework-test:latest
    container_name: mmorpg-framework-test
    restart: unless-stopped
    environment:
      - AUTO_RUN_TESTS=1          # 启动时自动运行全部测试
      - DOTNET_gcServer=1         # 服务器 GC 模式
      - Logging__MinLevel=Info
      # 测试框架配置
      - TEST_TIMEOUT_SECONDS=30   # 单测试超时时间（秒）
      - TEST_MAX_RETRIES=2       # 测试失败重试次数
      # - TEST_API_KEY=your-secret-key  # API认证密钥（可选，取消注释并修改）
    ports:
      - "7001:7001"   # TCP 游戏端口
      - "8080:8080"   # HTTP 命令端点（/health /metrics /test/run）
      - "9091:9091"   # Prometheus 指标端点
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8080/health"]
      interval: 15s
      timeout: 3s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"
    networks:
      - mmorpg-net

  # ---------- Prometheus 指标采集 ----------
  prometheus:
    image: prom/prometheus:latest
    container_name: mmorpg-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    networks:
      - mmorpg-net

  # ---------- Grafana 可视化 ----------
  grafana:
    image: grafana/grafana:latest
    container_name: mmorpg-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - mmorpg-net

networks:
  mmorpg-net:
    driver: bridge

volumes:
  prometheus-data:
  grafana-data:
