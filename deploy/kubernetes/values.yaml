# Default values for MMORPG Framework

replicaCount: 1

image:
  repository: mmorpg/framework-test
  pullPolicy: IfNotPresent
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 10000
  runAsGroup: 10000
  fsGroup: 10000

securityContext:
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

service:
  type: ClusterIP
  httpPort: 8080
  tcpPort: 7001
  prometheusPort: 9091

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []

resources:
  limits:
    cpu: 2000m
    memory: 2Gi
  requests:
    cpu: 500m
    memory: 512Mi

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app
                operator: In
                values:
                  - mmorpg-framework
          topologyKey: kubernetes.io/hostname

# Application-specific configuration
app:
  config:
    # Network settings
    tcpPort: 7001
    httpPort: 8080
    prometheusPort: 9091
    
    # Game scheduler
    targetFps: 30
    
    # Network settings
    maxConnections: 10000
    heartbeatTimeoutSeconds: 30
    messageRetryCount: 3
    
    # Metrics settings
    enableMetrics: true
    enableTracing: true

# Monitoring configuration
monitoring:
  enabled: true
  prometheus:
    enabled: true
    port: 9091
    path: /metrics
  grafana:
    enabled: false
    dashboardUrl: ""

# Health check configuration
livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 10
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

# Pod Disruption Budget
podDisruptionBudget:
  enabled: true
  minAvailable: 1
  maxUnavailable: ""

# Volume mounts
volumes: []

persistence:
  enabled: false
  storageClass: ""
  accessMode: ReadWriteOnce
  size: 1Gi
