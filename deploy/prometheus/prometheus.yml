# Prometheus 配置 - MMORPG Framework 测试环境

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # 抓取 MMORPG Framework 测试工具的指标
  - job_name: 'mmorpg-framework-test'
    static_configs:
      - targets: ['framework-test:8080']
    metrics_path: '/metrics'
    scrape_interval: 5s
