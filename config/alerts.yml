groups:
  - name: mmorpg.rules
    rules:
      # ============ 游戏服务器告警 ============
      - alert: GameServerDown
        expr: up{job="mmorpg-gameserver"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "游戏服务器不可用"
          description: "游戏服务器 {{ $labels.instance }} 已停止运行超过 1 分钟"

      - alert: HighErrorRate
        expr: rate(mmorpg_errors_total[5m]) > 0.05
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "错误率过高"
          description: "游戏服务器错误率超过 5%，当前值: {{ $value | humanizePercentage }}"

      - alert: HighLatency
        expr: histogram_quantile(0.99, rate(mmorpg_message_duration_seconds_bucket[5m])) > 0.5
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "延迟过高"
          description: "P99 延迟超过 500ms，当前值: {{ $value | humanizeDuration }}"

      - alert: CircuitBreakerOpen
        expr: mmorpg_circuit_breaker_state == 1
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "熔断器已触发"
          description: "熔断器 [{{ $labels.circuit_breaker }}] 处于 Open 状态"

      # ============ Redis 告警 ============
      - alert: RedisDown
        expr: up{job="redis"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Redis 不可用"
          description: "Redis 服务器已停止运行"

      - alert: RedisHighMemoryUsage
        expr: redis_memory_used_bytes / redis_memory_max_bytes > 0.9
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Redis 内存使用率过高"
          description: "Redis 内存使用率超过 90%"

      # ============ 系统级告警 ============
      - alert: HighCPUUsage
        expr: 100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "CPU 使用率过高"
          description: "服务器 CPU 使用率超过 80%"

      - alert: HighMemoryUsage
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "内存使用率过高"
          description: "服务器内存使用率超过 85%"
